<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Nuovo Gioco - Raccolta Gemme</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; background: linear-gradient(45deg, #667eea 0%, #764ba2 100%); color: #fff; }
    #game-wrap { position: fixed; inset: 0; width: 100vw; height: 100vh; background: #1a1a2e; overflow: hidden; z-index: 999; }
    #hud { padding: 10px; display: flex; justify-content: space-between; font-size: 1rem; background: rgba(0,0,0,0.5); }
    #field { position: relative; width: 100%; height: calc(100% - 44px); overflow: hidden; }
    .player, .gem, .enemy { position: absolute; border-radius: 50%; }
    .player { width: 40px; height: 40px; background: #ff6b6b; border: 2px solid #fff; }
    .gem { width: 20px; height: 20px; background: #ffd93d; box-shadow: 0 0 10px #ffd93d; }
    .enemy { width: 30px; height: 30px; background: #ff4757; box-shadow: 0 0 10px #ff4757; }
    #controls { display: none; justify-content: center; gap: 8px; margin-top: 8px; }
    .btn { padding: 10px 12px; font-size: 0.85rem; background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; border-radius: 8px; touch-action: manipulation; }
    .btn:active { transform: scale(0.95); }
    @media (max-width: 600px) {
      #hud { font-size: 0.9rem; }
      .player { width: 35px; height: 35px; }
      .gem { width: 18px; height: 18px; }
      .enemy { width: 25px; height: 25px; }
      #controls { display: flex; position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); border-radius: 12px; padding: 6px; z-index: 1002; }
      #controls .btn { min-width: 44px; min-height: 44px; font-size: 1.1rem; }
    }
    #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; color: #fff; text-align: center; padding: 18px; z-index: 1003; }
    #overlay button { margin-top: 12px; }
    #leaderboard { position: absolute; top: 16px; right: 16px; width: 250px; background: rgba(0,0,0,0.8); border: 1px solid #fff; border-radius: 10px; padding: 12px; color: #fff; z-index: 1001; font-size: 0.85rem; display: none; }
    #leaderboard h3 { margin: 0 0 8px; font-size: 1rem; text-align: center; }
    #leaderboard ol { margin: 0; padding-left: 18px; max-height: 200px; overflow-y: auto; }
    #leaderboard li { margin: 4px 0; }
    #leaderboard button { width: 100%; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="game-wrap">
    <div id="hud">
      <span>Punteggio: <strong id="score">0</strong></span>
      <span>Vite: <strong id="life">3</strong></span>
      <span>Livello: <strong id="level">1</strong></span>
      <button id="toggle-leaderboard" class="btn">Leaderboard</button>
    </div>
    <div id="field"></div>
    <div id="controls">
      <button class="btn" data-dir="left">◀</button>
      <button class="btn" data-dir="up">▲</button>
      <button class="btn" data-dir="down">▼</button>
      <button class="btn" data-dir="right">▶</button>
    </div>
    <div id="overlay">
      <div>
        <h2>Gioco finito</h2>
        <p id="message">Hai perso!</p>
        <button id="restart" class="btn">Ricomincia</button>
      </div>
    </div>
    <div id="leaderboard">
      <h3>Leaderboard</h3>
      <ol id="leaderboard-list"></ol>
      <button id="reset-leaderboard" class="btn">Reset Leaderboard</button>
      <button id="add-enemies" class="btn">Aggiungi Nemici</button>
      <button id="add-gems" class="btn">Aggiungi Gemme</button>
      <button id="close-leaderboard" class="btn">Chiudi</button>
    </div>
  </div>

  <script>
    const field = document.getElementById('field');
    const scoreEl = document.getElementById('score');
    const lifeEl = document.getElementById('life');
    const levelEl = document.getElementById('level');
    const overlay = document.getElementById('overlay');
    const message = document.getElementById('message');
    const restart = document.getElementById('restart');
    const leaderboardList = document.getElementById('leaderboard-list');
    const toggleLeaderboard = document.getElementById('toggle-leaderboard');
    const closeLeaderboard = document.getElementById('close-leaderboard');
    const resetLeaderboard = document.getElementById('reset-leaderboard');
    const addEnemies = document.getElementById('add-enemies');
    const addGems = document.getElementById('add-gems');
    const leaderboard = document.getElementById('leaderboard');

    let width, height;
    let player, gems = [], enemies = [];
    let score = 0, life = 3, level = 1;
    let keys = {};
    const speed = 5;

    function resize() {
      width = field.clientWidth || window.innerWidth || 800;
      height = field.clientHeight || window.innerHeight - 44 || 600;
    }

    function setPosition(el, x, y) {
      el.x = Math.max(0, Math.min(width - el.offsetWidth, x));
      el.y = Math.max(0, Math.min(height - el.offsetHeight, y));
      el.style.left = el.x + 'px';
      el.style.top = el.y + 'px';
    }

    function createPlayer() {
      player = document.createElement('div');
      player.className = 'player';
      field.appendChild(player);
      setPosition(player, width / 2 - 20, height - 60);
    }

    function spawnGems() {
      for (let i = 0; i < 5; i++) {
        let g = document.createElement('div');
        g.className = 'gem';
        field.appendChild(g);
        setPosition(g, Math.random() * (width - 20) || 0, Math.random() * (height / 2));
        gems.push(g);
      }
    }

    function spawnEnemies() {
      const numEnemies = 3 + Math.floor(level / 2);
      for (let i = 0; i < numEnemies; i++) {
        let e = document.createElement('div');
        e.className = 'enemy';
        field.appendChild(e);
        setPosition(e, Math.random() * (width - 30) || 0, -Math.random() * 100 - 50);
        e.speed = 2 + Math.random() * 2 + (level - 1) * 0.5;
        enemies.push(e);
      }
    }

    function hitTest(a, b) {
      const ra = a.getBoundingClientRect(), rb = b.getBoundingClientRect();
      return !(ra.right < rb.left || ra.left > rb.right || ra.bottom < rb.top || ra.top > rb.bottom);
    }

    function updateHUD() {
      scoreEl.textContent = score;
      lifeEl.textContent = life;
      levelEl.textContent = level;
    }

    function getLeaderboard() {
      try {
        const stored = localStorage.getItem('gemGameLeaderboard');
        return stored ? JSON.parse(stored) : [];
      } catch (e) {
        console.error('Errore caricamento leaderboard:', e);
        return [];
      }
    }

    function setLeaderboard(list) {
      try {
        localStorage.setItem('gemGameLeaderboard', JSON.stringify(list));
      } catch (e) {
        console.error('Errore salvataggio leaderboard:', e);
      }
    }

    function renderLeaderboard() {
      const list = getLeaderboard();
      leaderboardList.innerHTML = '';
      if (!list.length) {
        leaderboardList.innerHTML = '<li>Nessun punteggio</li>';
        return;
      }
      list.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.name}: ${item.score} punti`;
        leaderboardList.appendChild(li);
      });
    }

    function saveScore() {
      const name = 'Giocatore';
      const list = getLeaderboard();
      list.push({ name, score });
      list.sort((a, b) => b.score - a.score);
      setLeaderboard(list.slice(0, 10));
      renderLeaderboard();
    }

    function gameOver() {
      overlay.style.display = 'flex';
      message.textContent = 'Hai perso! Punteggio: ' + score;
      saveScore();
      leaderboard.style.display = 'block';
      cancelAnimationFrame(animId);
    }

    let animId;
    function gameLoop() {
      if (!width || !height) resize();
      if (!player) return;

      const px = player.x + ((keys['ArrowRight'] || keys['right']) ? speed : (keys['ArrowLeft'] || keys['left']) ? -speed : 0);
      const py = player.y + ((keys['ArrowDown'] || keys['down']) ? speed : (keys['ArrowUp'] || keys['up']) ? -speed : 0);
      setPosition(player, px, py);

      enemies.forEach((e, idx) => {
        setPosition(e, e.x, e.y + e.speed);
        if (e.y + e.offsetHeight >= height) {
          e.remove();
          enemies.splice(idx, 1);
          let ne = document.createElement('div');
          ne.className = 'enemy';
          field.appendChild(ne);
          setPosition(ne, Math.random() * (width - 30) || 0, -50);
          ne.speed = 2 + Math.random() * 2;
          enemies.push(ne);
        }
        if (hitTest(player, e)) {
          life--;
          updateHUD();
          e.remove();
          enemies.splice(idx, 1);
          let ne = document.createElement('div');
          ne.className = 'enemy';
          field.appendChild(ne);
          setPosition(ne, Math.random() * (width - 30) || 0, -50);
          ne.speed = 2 + Math.random() * 2;
          enemies.push(ne);
          if (life <= 0) {
            gameOver();
            return;
          }
        }
      });

      gems.forEach((g, idx) => {
        if (hitTest(player, g)) {
          g.remove();
          gems.splice(idx, 1);
          score += 10;
          updateHUD();
        }
      });

      if (life <= 0) return;
      if (!gems.length) {
        level++;
        updateHUD();
        spawnGems();
      }

      animId = requestAnimationFrame(gameLoop);
    }

    function initGame() {
      score = 0;
      life = 3;
      level = 1;
      updateHUD();
      field.innerHTML = '';
      gems = [];
      enemies = [];
      createPlayer();
      spawnGems();
      spawnEnemies();
      overlay.style.display = 'none';
      resize();
      cancelAnimationFrame(animId);
      animId = requestAnimationFrame(gameLoop);
    }

    window.addEventListener('resize', resize);

    document.addEventListener('keydown', e => { keys[e.key] = true; });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('touchstart', e => {
        const d = btn.dataset.dir;
        if (d) {
          keys[d] = true;
          e.preventDefault();
        }
      });
      btn.addEventListener('touchend', e => {
        const d = btn.dataset.dir;
        if (d) {
          keys[d] = false;
          e.preventDefault();
        }
      });
      btn.addEventListener('mousedown', () => {
        const d = btn.dataset.dir;
        keys[d] = true;
      });
      btn.addEventListener('mouseup', () => {
        const d = btn.dataset.dir;
        keys[d] = false;
      });
      btn.addEventListener('mouseleave', () => {
        const d = btn.dataset.dir;
        keys[d] = false;
      });
    });

    restart.addEventListener('click', initGame);

    toggleLeaderboard.addEventListener('click', () => {
      leaderboard.style.display = leaderboard.style.display === 'none' ? 'block' : 'none';
    });

    closeLeaderboard.addEventListener('click', () => {
      leaderboard.style.display = 'none';
    });

    resetLeaderboard.addEventListener('click', () => {
      localStorage.removeItem('gemGameLeaderboard');
      renderLeaderboard();
    });

    addEnemies.addEventListener('click', () => {
      spawnEnemies();
    });

    addGems.addEventListener('click', () => {
      spawnGems();
    });

    renderLeaderboard();
    initGame();
  </script>
</body>
</html>
